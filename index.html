<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laren Roleplay</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #ffffff;
            text-align: center;
            padding: 50px;
        }

        .kutu {
            background: rgb(216, 184, 0);
            max-width: 500px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #0078ff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="kutu">
        <h1>Laren Roleplay</h1>
        <p>Uygun Donate Fiyatları</p>

        <button onclick="mesaj()">Tıkla</button>
    </div>

    <script>
        function mesaj() {
            alert("Merhaba!");
        }
    </script>

</body>
</html>
